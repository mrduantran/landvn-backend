# fly.toml app configuration file generated for landvn-backend on 2026-05-11T20:07:51+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'landvn-backend'
primary_region = 'sin'

[build]

[env]
  PORT = '8080'
  SPRING_PROFILE = 'prod'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
